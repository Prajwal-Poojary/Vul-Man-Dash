<div class="container">
  <h2>Verify Password </h2>
  <p class="report-title">Editing: <strong>{{reportTitle}}</strong></p>
  
  <form (ngSubmit)="verifyPassword()" class="verify-form">
    <div class="form-group">
      <label for="password">Enter Password:</label>
      <input
        type="password"
        id="password"
        [(ngModel)]="password"
        name="password"
        required
        placeholder="Enter report password"
        [disabled]="isLoading"
      />
    </div>

    <div class="form-actions">
      <button 
        type="button"
        (click)="cancelVerification()"
        class="btn-cancel"
        [disabled]="isLoading"
      >
        Cancel
      </button>
      <button 
        type="submit"
        class="btn-verify"
        [disabled]="isLoading || !password.trim()"
      >
        <span *ngIf="!isLoading">Verify</span>
        <span *ngIf="isLoading">Verifying...</span>
      </button>
    </div>
  </form>

  <div *ngIf="errorMsg" class="alert error">
    {{ errorMsg }}
  </div>
  <div *ngIf="successMsg" class="alert success">
    {{ successMsg }}
  </div>
</div>
