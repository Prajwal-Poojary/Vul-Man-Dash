<form (ngSubmit)="saveReport()" class="report-form" novalidate>
  <label for="title">Report Title</label>
  <input
    id="title"
    [(ngModel)]="report.title"
    name="title"
    required
    placeholder="Enter report title"
  />

  <label for="password">Password</label>
  <div class="password-input">
    <input
      id="password"
      [type]="showPassword ? 'text' : 'password'"
      [(ngModel)]="report.password"
      name="password"
      required
      minlength="5"
      placeholder="Enter password"
      (input)="checkStrength()"
    />
    <span
      class="toggle-password"
      (click)="togglePassword()"
      role="button"
      tabindex="0"
      aria-label="Toggle password visibility"
    >
      <svg
        *ngIf="!showPassword"
        xmlns="http://www.w3.org/2000/svg"
        width="24"
        height="24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        class="feather feather-eye"
      >
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
        <circle cx="12" cy="12" r="3" />
      </svg>
      <svg
        *ngIf="showPassword"
        xmlns="http://www.w3.org/2000/svg"
        width="24"
        height="24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        class="feather feather-eye-off"
      >
        <path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a20.12 20.12 0 0 1 5.88-6.88" />
        <path d="M1 1l22 22" />
        <path d="M10.59 10.59a3 3 0 0 0 4.24 4.24" />
      </svg>
    </span>
  </div>

  <div class="strength-bar" [ngClass]="passwordStrength"></div>

  <label for="confirmPassword">Confirm Password</label>
  <div class="password-input">
    <input
      id="confirmPassword"
      [type]="showConfirmPassword ? 'text' : 'password'"
      [(ngModel)]="report.confirmPassword"
      name="confirmPassword"
      required
      placeholder="Confirm password"
    />
    <span
      class="toggle-password"
      (click)="toggleConfirmPassword()"
      role="button"
      tabindex="0"
      aria-label="Toggle confirm password visibility"
    >
      <svg
        *ngIf="!showConfirmPassword"
        xmlns="http://www.w3.org/2000/svg"
        width="24"
        height="24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        class="feather feather-eye"
      >
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
        <circle cx="12" cy="12" r="3" />
      </svg>
      <svg
        *ngIf="showConfirmPassword"
        xmlns="http://www.w3.org/2000/svg"
        width="24"
        height="24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        class="feather feather-eye-off"
      >
        <path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a20.12 20.12 0 0 1 5.88-6.88" />
        <path d="M1 1l22 22" />
        <path d="M10.59 10.59a3 3 0 0 0 4.24 4.24" />
      </svg>
    </span>
  </div>

  <button type="submit" class="btn-save">Save</button>
</form>
